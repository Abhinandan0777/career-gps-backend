services:
  - type: web
    name: career-gps-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Add other environment variables in Render dashboard
      # DATABASE_URL, JWT_SECRET, etc.
